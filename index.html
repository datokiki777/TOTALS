<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Period Totals</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1220">
</head>

<body>
  <header class="topbar">
    <!-- Brand -->
    <div class="brand">
      <div class="logo">CT</div>
      <div>
        <div class="title">Client Totals</div>
        <div class="subtitle">Periods • Gross/Net • My €</div>
      </div>
    </div>
    
    <div class="mode-toggle">
      <button id="modeEditBtn" class="toggle-btn active">Edit</button>
      <button id="modeReviewBtn" class="toggle-btn">Review</button>
    </div>
    
    <button id="controlsToggle" class="btn small">Controls</button>

    <!-- Controls -->
    <div class="controls">
      <!-- LEFT SIDE: Groups + Default -->
      <div class="actions-left">
        <!-- GROUPS -->
        <label class="field group-field">
          <span>Group</span>
          <div class="group-row">
            <select id="groupSelect" class="select"></select>
            <button id="addGroupBtn" class="btn small primary">+ Group</button>
            <button id="renameGroupBtn" class="btn small">Rename</button>
            <button id="deleteGroupBtn" class="btn small danger">Del</button>
          </div>
        </label>

        <label class="field">
          <span>Default %</span>
          <input id="defaultRate" type="number" step="0.01" min="0" max="100" value="13.5" />
        </label>
      </div>

      <!-- RIGHT SIDE: Actions -->
      <div class="actions-right">
        <!-- MAIN ACTIONS -->
        <div class="btn-row">
          <button id="addPeriodBtn" class="btn primary">+ New Period</button>

          <button id="exportBtn" class="btn">Export</button>
          <label id="importLabel" class="btn      file">
               Import
               <input id="importInput" type="file" accept="application/json" hidden />
          </label>

          <button id="resetBtn" class="btn danger">Reset</button>
        </div>

        <!-- BACKUP (ALL GROUPS) -->
        <div class="btn-row backup-row">
          <button id="exportAllBtn" class="btn">Export All</button>
          <button id="pdfAllBtn" class="btn">PDF (All)</button>
          <label id="importAllLabel" class="btn file">
             Import All
             <input id="importAllInput" type="file" accept="application/json" hidden />
          </label>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="summary card">
      <div class="summary-head">
        <h2>Grand Total</h2>

        <div class="toggle">
          <button id="totalsActiveBtn" class="toggle-btn active">Active</button>
          <button id="totalsAllBtn" class="toggle-btn">All</button>
        </div>
      </div>

      <div class="summary-grid">
        <div class="kpi">
          <div class="kpi-label">Gross</div>
          <div class="kpi-value" id="grandGross">0.00</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Net</div>
          <div class="kpi-value" id="grandNet">0.00</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">My €</div>
          <div class="kpi-value" id="grandMy">0.00</div>
        </div>
      </div>

      <div class="hint">Tip: numbers accept decimals. Use dot or comma; app normalizes.</div>
    </section>

    <!-- EDIT VIEW -->
      <div id="editView">
  <div id="periods"></div>
</div>

    <!-- REVIEW VIEW -->
      <div id="reviewView" hidden></div>

    <footer class="footer">
      <div>Saved locally on this device. Use Export/Import for backup.</div>
    </footer>
  </main>

  <template id="periodTpl">
    <section class="period card">
      <div class="period-head">
        <div class="period-title">
          <h2>Period</h2>
          <div class="period-dates">
            <label class="field">
              <span>From</span>
              <input class="fromDate" type="date" />
            </label>
            <label class="field">
              <span>To</span>
              <input class="toDate" type="date" />
            </label>
          </div>
        </div>

        <div class="period-actions">
          <button class="btn small addRow">+ Add client</button>
          <td class="actions">
           <button class="btn danger small removeRow">Remove</button>
          </td>
        </div>
      </div>

      <div class="table-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <th style="width: 32%">Customer</th>
              <th style="width: 18%">Gross</th>
              <th style="width: 18%">Net</th>
              <th style="width: 18%">City</th>
              <th style="width: 14%">Actions</th>
            </tr>
          </thead>
          <tbody class="rows"></tbody>
          <tfoot>
            <tr class="total-row">
              <td class="total-label">TOTAL</td>
              <td class="total-gross">0.00</td>
              <td class="total-net">0.00</td>
              <td class="total-my">
                <span class="pill">My €: <b class="my-eur">0.00</b></span>
              </td>
            </tr>
          </tfoot>
        </table>
      </div>
    </section>
  </template>

  <template id="rowTpl">
    <tr>
      <td><input class="cust" type="text" placeholder="Client name" /></td>
      <td><input class="gross" type="text" inputmode="decimal" placeholder="0" /></td>
      <td><input class="net" type="text" inputmode="decimal" placeholder="0" /></td>
      <td><input class="city" type="text" placeholder="City" /></td>
      <td><button class="btn small ghost removeRow">Remove</button></td>
    </tr>
  </template>

  <!-- Scroll to top button (must be inside body) -->
  <button id="toTopBtn" class="to-top" aria-label="Back to top">↑</button>
  <button id="fabAddClient" class="btn primary fab-add-client">+ Add client</button>

<!-- Confirm Modal -->
  <div id="confirmModal" class="modal-backdrop" style="display:none;">
    <div class="modal">
      <div class="modal-title" id="confirmTitle">Confirm</div>
      <div class="modal-text" id="confirmText">Are you sure?</div>
      <div class="modal-actions">
        <button id="confirmNo" class="btn">No</button>
        <button id="confirmYes" class="btn danger">Yes</button>
      </div>
    </div>
  </div>

  <!-- ✅ script MUST be inside body, before closing -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" ></script>
  <script src="app.js"></script>
  <script>
     if ("serviceWorker" in navigator) {
       navigator.serviceWorker.register("service-worker.js");
  }
</script>
<!-- Update Banner -->
<div id="updateBanner" class="update-banner" style="display:none;">
  <span>New version available</span>
  <button id="updateNowBtn" class="btn primary small">UPDATE</button>
</div>
</body>
</html>
